<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Senha - Gnosis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
<div class="login-container">
  <div class="card p-4 shadow" style="width: 100%; max-width: 500px; border-radius: 10px;">
    <div class="text-center mb-4">
      <i class="bi bi-book" style="font-size: 3rem; color: var(--primary-color);"></i>
      <h3 class="mt-2">Recuperar Senha</h3>
      <p class="text-muted">Informe seu e-mail para recuperar a senha</p>
    </div>
    
    <form id="formRecuperarSenha">
      <div class="mb-4">
        <label for="email" class="form-label">E-mail cadastrado</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Seu e-mail" required>
        </div>
        <div class="invalid-feedback" id="email-feedback"></div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
        <i class="bi bi-send me-2"></i> Enviar Link de Recuperação
      </button>
      
      <div class="text-center">
        <p class="mb-0 text-muted">Lembrou sua senha? <a href="login.html" class="text-primary">Faça login</a></p>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('formRecuperarSenha').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
    const usuario = usuarios.find(u => u.email === email);
    
    if (!usuario) {
      document.getElementById('email-feedback').textContent = 'E-mail não encontrado em nosso sistema!';
      document.getElementById('email-feedback').style.display = 'block';
      document.getElementById('email').classList.add('is-invalid');
      return;
    }
    
    // Simulação de envio de e-mail (em produção seria uma chamada ao backend)
    alert(`Um link de recuperação foi enviado para ${email}. Verifique sua caixa de entrada.`);
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
