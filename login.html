    <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Gnosis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
<div class="login-container">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px; border-radius: 10px;">
    <div class="text-center mb-4">
      <i class="bi bi-book" style="font-size: 3rem; color: var(--primary-color);"></i>
      <h3 class="mt-2">Acesso do Aluno</h3>
      <p class="text-muted">Entre com suas credenciais</p>
    </div>
    
    <form id="loginForm">
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Seu usuário" required>
        </div>
      </div>
      
      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
        <div class="invalid-feedback" id="login-feedback"></div>
      </div>
      
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="lembrar">
        <label class="form-check-label" for="lembrar">Lembrar de mim</label>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
      </button>
      
      <div class="text-center">
        <a href="recuperar-senha.html" class="text-decoration-none">Esqueceu a senha?</a>
        <p class="mt-3 mb-0 text-muted">Novo aqui? <a href="cadastro.html" class="text-primary">Cadastre-se</a></p>
      </div>
    </form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Alternar visibilidade da senha
  document.getElementById('togglePassword').addEventListener('click', function() {
    const senha = document.getElementById('senha');
    const icon = this.querySelector('i');
    if (senha.type === 'password') {
      senha.type = 'text';
      icon.classList.remove('bi-eye-fill');
      icon.classList.add('bi-eye-slash-fill');
    } else {
      senha.type = 'password';
      icon.classList.remove('bi-eye-slash-fill');
      icon.classList.add('bi-eye-fill');
    }
  });

  // Verificar credenciais
  function verificarCredenciais(usuario, senha) {
    const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
    return usuarios.find(u => u.usuario === usuario && u.senha === senha);
  }

  // Login
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value.trim();
    const senha = document.getElementById('senha').value;
    const feedback = document.getElementById('login-feedback');
    const lembrar = document.getElementById('lembrar').checked;

    const usuarioEncontrado = verificarCredenciais(usuario, senha);

    if (!usuarioEncontrado) {
      feedback.textContent = 'Usuário ou senha incorretos!';
      feedback.style.display = 'block';
      document.getElementById('senha').classList.add('is-invalid');
      return;
    }

    localStorage.setItem('usuarioLogado', JSON.stringify(usuarioEncontrado));

    if (lembrar) {
      localStorage.setItem('credenciaisSalvas', JSON.stringify({
        usuario,
        lembrar: true
      }));
    } else {
      localStorage.removeItem('credenciaisSalvas');
    }

    window.location.href = 'index.html';
  });

  // Preencher campos com dados salvos
  document.addEventListener('DOMContentLoaded', () => {
    const credenciais = JSON.parse(localStorage.getItem('credenciaisSalvas') || 'null');
    if (credenciais && credenciais.lembrar) {
      document.getElementById('usuario').value = credenciais.usuario || '';
      document.getElementById('lembrar').checked = true;
    }
  });
</script>
</body>
</html>
